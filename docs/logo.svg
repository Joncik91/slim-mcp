<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="slim-mcp">
  <title>slim-mcp</title>
  <rect width="400" height="400" rx="48" fill="#0E0E0F"/>

  <!--
    Hourglass: outer frame (stroked) + sand piles inside.
    Top chamber: nearly empty (small triangle of sand at the apex).
    Bottom chamber: mostly full (big triangle of sand filling base).
    Reads as "compression has happened — most of the data is now
    condensed at the bottom."
  -->

  <!-- Frame: top bar, bottom bar, and the X-shaped chambers -->
  <g fill="none" stroke="#E8954A" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Top horizontal cap -->
    <line x1="116" y1="80" x2="284" y2="80" stroke-width="20"/>
    <!-- Bottom horizontal cap -->
    <line x1="116" y1="320" x2="284" y2="320" stroke-width="20"/>
    <!-- Left diagonals (top chamber slope + bottom chamber slope) -->
    <line x1="120" y1="86" x2="200" y2="200" stroke-width="18"/>
    <line x1="200" y1="200" x2="120" y2="314" stroke-width="18"/>
    <!-- Right diagonals -->
    <line x1="280" y1="86" x2="200" y2="200" stroke-width="18"/>
    <line x1="200" y1="200" x2="280" y2="314" stroke-width="18"/>
  </g>

  <!-- Top chamber sand (small remaining amount, cone shape near apex) -->
  <path d="M 178 184 L 222 184 L 200 210 Z" fill="#E8954A"/>

  <!-- Bottom chamber sand (mostly full, big trapezoid) -->
  <path d="M 144 314 L 256 314 L 230 254 L 170 254 Z" fill="#E8954A"/>
</svg>
